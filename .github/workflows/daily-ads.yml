name: Daily Ads (ad-forge)

# Generates PeekScout video ads each day — one per brief in ad-forge/briefs/daily
# (med spa, pet grooming, real estate = 3/day) — uploads each .mp4 as a review
# artifact and optionally auto-posts to social.
#
# SAFE BY DEFAULT: free MOCK mode (no Veo spend) until repo var ADFORGE_REAL=1.
# Veo key = repo secret GEMINI_API_KEY.
on:
  schedule:
    # 13:10 UTC daily (~9am ET).
    - cron: "10 13 * * *"
  workflow_dispatch:
    inputs:
      brief:
        description: "Single brief filename to force (blank = all daily briefs)"
        required: false
        default: ""
        type: string
      real:
        description: "Spend Veo credits for real footage?"
        required: false
        default: false
        type: boolean
      model:
        description: "Veo model override (blank = default)"
        required: false
        default: ""
        type: string

concurrency:
  group: daily-ads
  cancel-in-progress: false

jobs:
  # Decide which briefs to build: the one forced via dispatch, or all daily briefs.
  plan:
    runs-on: ubuntu-latest
    outputs:
      briefs: ${{ steps.set.outputs.briefs }}
    env:
      # How many category videos to build per day. All 16 categories rotate
      # through over time. Raise to 16 to do every category every day.
      ADFORGE_DAILY_COUNT: ${{ vars.ADFORGE_DAILY_COUNT || '4' }}
    steps:
      - uses: actions/checkout@v4
      - id: set
        run: |
          forced="${{ github.event.inputs.brief }}"
          if [ -n "$forced" ]; then
            briefs=$(printf '%s' "$forced" | jq -R -s -c 'split("\n") | map(select(length>0))')
          else
            mapfile -t all < <(ls ad-forge/briefs/daily/*.json | xargs -n1 basename | sort)
            n=${#all[@]}
            count=${ADFORGE_DAILY_COUNT:-4}
            [ "$count" -gt "$n" ] && count=$n
            day=$(( $(date -u +%s) / 86400 ))
            sel=()
            for ((i=0; i<count; i++)); do
              idx=$(( (day*count + i) % n ))
              sel+=("${all[$idx]}")
            done
            briefs=$(printf '%s\n' "${sel[@]}" | jq -R . | jq -s -c '.')
          fi
          echo "briefs=$briefs" >> "$GITHUB_OUTPUT"
          echo "Building ($ADFORGE_DAILY_COUNT/day of $(ls ad-forge/briefs/daily/*.json | wc -l)): $briefs"

  make-ad:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        brief: ${{ fromJSON(needs.plan.outputs.briefs) }}
    defaults:
      run:
        working-directory: ad-forge
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      VEO_MODEL: ${{ github.event.inputs.model || vars.VEO_MODEL || 'veo-3.1-fast-generate-preview' }}
      # MOCK unless real footage is explicitly requested (input or repo var).
      MOCK: ${{ (github.event.inputs.real == 'true' || vars.ADFORGE_REAL == '1') && '0' || '1' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Headless-Chrome + font libs Remotion needs on Linux runners.
      - name: System deps for Remotion
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libgbm-dev libasound2t64 \
            libxrandr2 libxkbcommon0 libxfixes3 libxcomposite1 libxdamage1 \
            libatk-bridge2.0-0 libpango-1.0-0 libcairo2 libcups2 \
            fonts-liberation fonts-dejavu-core || true

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Resolve brief
        id: pick
        run: |
          b="${{ matrix.brief }}"
          if [ -f "$b" ]; then brief="$b";
          elif [ -f "briefs/daily/$b" ]; then brief="briefs/daily/$b";
          else brief="briefs/$b"; fi
          base="$(basename "$brief" .json)"
          echo "brief=$brief" >> "$GITHUB_OUTPUT"
          echo "base=$base"   >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          echo "Building: $brief  (MOCK=$MOCK)"

      - name: Guard — real runs need a key
        if: ${{ env.MOCK == '0' }}
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::ADFORGE_REAL is on but GEMINI_API_KEY secret is missing."
            exit 1
          fi

      - name: Generate footage (Veo, or mock)
        run: npx tsx src/generate.ts "${{ steps.pick.outputs.brief }}"

      - name: Compose final video
        run: npx tsx src/compose.ts "out/${{ steps.pick.outputs.base }}.props.json" "out/${{ steps.pick.outputs.base }}.mp4"

      - name: Upload ad for review
        uses: actions/upload-artifact@v4
        with:
          name: ad-${{ steps.pick.outputs.date }}-${{ steps.pick.outputs.base }}
          path: ad-forge/out/${{ steps.pick.outputs.base }}.mp4
          if-no-files-found: error
          retention-days: 14

      # Auto-post to social via upload-post — OFF unless you opt in.
      # Enable: repo Variable ADFORGE_POST=1 and ADFORGE_PLATFORMS=tiktok,instagram,
      # plus secrets UPLOAD_POST_API_KEY, UPLOAD_POST_USER (PeekScout profile), and
      # FACEBOOK_PAGE_ID if posting to Facebook.
      - name: Auto-post to social
        if: ${{ env.MOCK == '0' && vars.ADFORGE_POST == '1' }}
        env:
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOAD_POST_USER: ${{ secrets.UPLOAD_POST_USER }}
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          ADFORGE_PLATFORMS: ${{ vars.ADFORGE_PLATFORMS }}
        run: npx tsx src/postad.ts "out/${{ steps.pick.outputs.base }}.mp4" "out/${{ steps.pick.outputs.base }}.props.json"
