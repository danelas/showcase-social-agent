name: Test Email

# Manual smoke test for the Resend setup: sends ONE email to the address you
# type in, using the same RESEND_API_KEY / RESEND_FROM_EMAIL secrets the
# recruiter uses. If this succeeds, live outreach sends will too.
on:
  workflow_dispatch:
    inputs:
      to:
        description: "Recipient address"
        required: true
        default: "danamazon6@gmail.com"
        type: string
      sample:
        description: "Send the real recruiter pitch (sample prospect) instead of a plain test line"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          TO: ${{ github.event.inputs.to }}
          SAMPLE: ${{ github.event.inputs.sample }}
        run: |
          [ -n "$RESEND_API_KEY" ] || { echo "::error::RESEND_API_KEY missing"; exit 1; }
          [ -n "$RESEND_FROM_EMAIL" ] || { echo "::error::RESEND_FROM_EMAIL missing"; exit 1; }
          if [ "$SAMPLE" = "true" ]; then
            # Mirror of renderEmail() in src/recruit/outreach.ts with a sample
            # prospect — keep in sync if the pitch copy changes.
            BRAND="PeekScout"; CITY="Nashville"; CAT="med spa & aesthetics"
            BIZ="NakedMD Med Spa Nashville"; CLAIM="https://peekscout.com/claim/SAMPLE-TOKEN"
            SUBJECT="I built you a $BRAND profile — $CITY clients are watching"
            cat > body.html <<EOF
          <!DOCTYPE html>
          <html><body style="font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;font-size:15px;color:#222;line-height:1.55;max-width:560px;margin:0 auto;padding:24px">
          <p>Hey there,</p>
          <p>I run <strong>$BRAND</strong> — a video-first marketplace where $CITY clients scroll short clips from local $CAT pros and book the one they like (think TikTok, but everyone on it is a bookable local provider).</p>
          <p>I already set up a profile for <strong>$BIZ</strong> so you don't have to start from scratch. It's reserved for you and hidden until you claim it — about 2 minutes to make it live: add a short intro video (or a few photos) and your booking link.</p>
          <p><a href="$CLAIM" style="display:inline-block;background:#111;color:#fff;text-decoration:none;padding:11px 20px;border-radius:8px;font-weight:600">Claim your profile</a></p>
          <p style="color:#666;font-size:13px">or paste this link: <a href="$CLAIM">$CLAIM</a></p>
          <p>Listings are free. Clients book/message/call you directly — no lead fees, no middleman.</p>
          <p>Not interested? Reply "no thanks" and I'll delete the profile and won't reach out again.</p>
          <p>— Dan, $BRAND</p>
          </body></html>
          EOF
            body=$(jq -n --arg from "$RESEND_FROM_EMAIL" --arg to "$TO" --arg subject "$SUBJECT" --rawfile html body.html \
              '{from: $from, to: $to, subject: $subject, html: $html}')
          else
            body=$(jq -n --arg from "$RESEND_FROM_EMAIL" --arg to "$TO" \
              '{from: $from, to: $to, subject: "PeekScout recruiter — Resend test", text: "If you are reading this, RESEND_API_KEY and RESEND_FROM_EMAIL are working. The recruiter can send."}')
          fi
          code=$(curl -s -o resp.json -w "%{http_code}" https://api.resend.com/emails \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$body")
          echo "HTTP $code"
          cat resp.json
          [ "$code" = "200" ] || { echo "::error::Resend rejected the send (HTTP $code) — see response above"; exit 1; }
