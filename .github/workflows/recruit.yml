name: Recruit Providers

# Daily provider recruitment for PeekScout. Discovers businesses on Google Places
# (a rotating MIX of cities per day — see recruit/cities.ts), then for each new prospect creates an
# unclaimed draft Provider in the shared PeekScout Postgres and cold-emails a
# claim link ("we already built your profile"). State lives in outreach_prospects.
on:
  # getpeekscout.com verified in Resend 2026-07-12 — daily cron live.
  schedule:
    # 15:00 UTC = 11 AM EDT / 10 AM EST.
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "live (create profiles + send) or dry-run"
        required: false
        default: "live"
        type: choice
        options: ["live", "dry-run"]
      max_sends:
        description: "Cap on first-touch emails sent this run"
        required: false
        default: "20"
        type: string
      max_followups:
        description: "Cap on follow-up emails sent this run"
        required: false
        default: "15"
        type: string

jobs:
  recruit:
    runs-on: ubuntu-latest
    # Discover scrapes each new prospect's website for an email + renders a
    # branded reel per send — a full 16-category city sweep is lengthy.
    # Headroom over the sum of the step budgets (20 + 30 + 70) so the job
    # never kills a step that's already policing itself.
    timeout-minutes: 130
    env:
      GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      # Optional — AI headline/bio on draft profiles; recruiter works without it.
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      RECRUIT_BRAND: ${{ secrets.RECRUIT_BRAND }}
      # Safety switch for the makeover A/B arm. Set repo variable MAKEOVER_LIVE
      # to "true" once the makeover pipeline is verified; until then the
      # makeover-assigned half gets the classic claim email.
      MAKEOVER_LIVE: ${{ vars.MAKEOVER_LIVE }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # postinstall runs `prisma generate`. npm install (not ci): the lockfile
      # is generated on Windows and npm's cross-platform optional-dep entries
      # drift from what Linux npm ci demands.
      - name: Install deps
        run: npm install --no-audit --no-fund

      # ffmpeg (video render) + a bold TTF (title-card text). ffmpeg is usually
      # preinstalled on ubuntu-latest; the font is not guaranteed.
      - name: Ensure ffmpeg + yt-dlp + font for reel rendering
        run: |
          ffmpeg -version >/dev/null 2>&1 || sudo apt-get update && sudo apt-get install -y ffmpeg
          sudo apt-get install -y fonts-dejavu-core || true
          # yt-dlp: used when a prospect's site links a real video, so we can
          # brand THEIR footage instead of the synthetic reel (RECRUIT_REAL_VIDEO).
          sudo apt-get install -y yt-dlp || python3 -m pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Check required secrets
        run: |
          missing=0
          if [ -z "$GOOGLE_PLACES_API_KEY" ] && [ -z "$GOOGLE_MAPS_API_KEY" ]; then
            echo "::error::Need GOOGLE_PLACES_API_KEY or GOOGLE_MAPS_API_KEY"; missing=1
          fi
          for v in POSTGRES_PRISMA_URL POSTGRES_URL_NON_POOLING RESEND_API_KEY RESEND_FROM_EMAIL NEXT_PUBLIC_APP_URL; do
            [ -z "${!v}" ] && { echo "::error::Required secret $v missing"; missing=1; } || echo "OK: $v present"
          done
          [ "$missing" = "0" ] || exit 1

      # Idempotent — creates outreach_prospects only if it doesn't already exist.
      # Does not touch any other table (no `prisma db push`). The recruit_bot DB
      # role has no CREATE privilege on purpose (DML only) — the PeekScout app's
      # vercel-build `prisma db push` is what actually maintains this table, so
      # a permission error here is expected and harmless.
      - name: Ensure outreach_prospects table exists
        run: npm run db:init || echo "::notice::db:init skipped (no CREATE perm) — the app's prisma db push maintains the table"

      # ORDER MATTERS: emails go out BEFORE discovery.
      #
      # Discovery takes 35-55 min per city (it scrapes every new prospect's
      # website for an address), so with it running first a slow sweep ate the
      # whole 60-min job and the send steps were cancelled — half the runs sent
      # nothing at all. Sending draws on the existing prospect pool, not on
      # today's finds, so it has no reason to wait. Discovery now runs last
      # with its own budget: if it's cut short, the only cost is fewer new
      # prospects, and the rotation covers that ground next cycle.

      # Second touch first — cheapest step (~1 min) and the warmest audience.
      # Also reconciles claimed prospects to CONVERTED.
      - name: Send follow-ups
        timeout-minutes: 20
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'live' }}
          MAX_FOLLOWUPS: ${{ github.event.inputs.max_followups || '15' }}
        run: |
          if [ "$RUN_MODE" = "live" ]; then
            npm run recruit:followup -- --live --max "$MAX_FOLLOWUPS" --min-age-days 3
          else
            npm run recruit:followup -- --max "$MAX_FOLLOWUPS" --min-age-days 3
          fi

      - name: Send outreach
        # Runs even if follow-ups failed — one bad email must not cost the
        # day's first-touch sends.
        if: always()
        timeout-minutes: 30
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'live' }}
          # 20/day = aggressive-but-safe ceiling while getpeekscout.com is
          # young (verified 2026-07-12). Raise toward 50-100 only after ~2
          # clean weeks (no spam complaints, bounce rate under ~3%).
          MAX_SENDS: ${{ github.event.inputs.max_sends || '20' }}
        run: |
          if [ "$RUN_MODE" = "live" ]; then
            npm run recruit:send -- --live --max "$MAX_SENDS"
          else
            npm run recruit:send -- --max "$MAX_SENDS"
          fi

      # Refills the pool for tomorrow. Self-limiting via --max-minutes, so it
      # ends cleanly instead of being killed by the job timeout.
      - name: Discover new prospects (today's rotating city mix)
        if: always()
        timeout-minutes: 70
        run: npm run recruit:discover -- --max-minutes 60
