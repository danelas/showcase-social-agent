name: Video Makeover Worker

# Processes free "PeekScout Video Makeover" requests. The app (POST /api/makeover)
# queues PENDING makeover_requests when a provider submits their IG/TikTok video;
# this worker downloads (yt-dlp), captions (Groq Whisper), brands + reformats
# (ffmpeg), uploads, and emails the finished clip back. State: makeover_requests.
on:
  schedule:
    # Every 20 minutes — keeps turnaround fast without hammering.
    - cron: "*/20 * * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "live (process + email) or dry-run (list only)"
        required: false
        default: "live"
        type: choice
        options: ["live", "dry-run"]
      max:
        description: "Max requests to process this run"
        required: false
        default: "10"
        type: string

# Don't let two scheduled runs process the same queue at once.
concurrency:
  group: makeover-worker
  cancel-in-progress: false

jobs:
  makeover:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
      POSTGRES_URL_NON_POOLING: ${{ secrets.POSTGRES_URL_NON_POOLING }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      RESEND_REPLY_TO: ${{ secrets.RESEND_REPLY_TO }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
      RECRUIT_BRAND: ${{ secrets.RECRUIT_BRAND }}
      # Optional: IG cookies file path if public downloads start failing.
      YTDLP_COOKIES: ${{ secrets.YTDLP_COOKIES }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # npm install (not ci): the lockfile is generated on Windows and npm's
      # cross-platform optional-dep entries drift from what Linux npm ci demands.
      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install ffmpeg, yt-dlp, and a bold font
        run: |
          ffmpeg -version >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ffmpeg)
          sudo apt-get install -y fonts-dejavu-core || true
          sudo apt-get install -y yt-dlp || python3 -m pip install --upgrade yt-dlp
          yt-dlp --version

      - name: Check required secrets
        run: |
          missing=0
          for v in POSTGRES_PRISMA_URL POSTGRES_URL_NON_POOLING RESEND_API_KEY RESEND_FROM_EMAIL NEXT_PUBLIC_APP_URL; do
            [ -z "${!v}" ] && { echo "::error::Required secret $v missing"; missing=1; } || echo "OK: $v present"
          done
          [ -z "$GROQ_API_KEY" ] && echo "::warning::GROQ_API_KEY missing — makeovers will render without captions"
          [ "$missing" = "0" ] || exit 1

      - name: Process makeover queue
        env:
          RUN_MODE: ${{ github.event.inputs.mode || 'live' }}
          MAX: ${{ github.event.inputs.max || '10' }}
        run: |
          if [ "$RUN_MODE" = "live" ]; then
            npm run makeover:run -- --live --max "$MAX"
          else
            npm run makeover:run -- --max "$MAX"
          fi
